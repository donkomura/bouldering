version: '3.8'

services:
  redis:
    image: redis:7-alpine
    ports:
      - "6379:6379"
    volumes:
      - redis_data:/data

  api:
    build:
      context: .
      dockerfile: Dockerfile.api
    command: uvicorn api.main:app --host 0.0.0.0 --port 8000 --reload
    ports:
      - "8000:8000"
    volumes:
      - .:/app
      - /tmp/uploads:/tmp/uploads
      - /tmp/results:/tmp/results
    environment:
      - REDIS_HOST=redis
      - REDIS_PORT=6379
    depends_on:
      - redis

  worker:
    build:
      context: .
      dockerfile: Dockerfile.api
    command: celery -A api.celery_app worker --loglevel=info
    volumes:
      - .:/app
      - /tmp/uploads:/tmp/uploads
      - /tmp/results:/tmp/results
    environment:
      - REDIS_HOST=redis
      - REDIS_PORT=6379
    depends_on:
      - redis

volumes:
  redis_data:
